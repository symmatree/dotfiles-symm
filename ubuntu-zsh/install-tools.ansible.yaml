---
- name: Install GitHub CLI and Linux Homebrew
  hosts: all
  become: yes
  vars:
    golang_version: "1.26.4"
    kubernetes_minor: "v1.32"
    # Pinned to the tiles CI helm (azure/setup-helm default in
    # .github/actions/helm-setup) so local chart renders are byte-identical.
    # Bump in lockstep with that. See dotfiles-symm#10 / tiles#589.
    helm_version: "4.2.0"
    dist_upgrade: false
    # Feature flags — override via -e @vars/rpi-console.yaml (or similar)
    install_vscode: true        # VS Code GUI editor; skip on headless/armhf
    install_claude_code: true   # Claude Code CLI; repo lacks armhf packages
    install_k8s_tools: true     # kubectl, kubectx
    install_cloud_tools: true   # gcloud, terraform, mimirtool, 1password-cli
    install_qemu: true          # qemu-user-static + binfmt-support (not needed on ARM host)
    install_notebook_tools: true  # texlive, playwright, nbconvert[webpdf], folium
    install_docker: true        # Docker Engine + CLI from Docker's apt repo
    install_brew: true          # Homebrew + brew-only tools; unsupported on Linux arm64
  tasks:
    - name: Capture dpkg architecture
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false
      tags: [nodesource]
    - set_fact:
        dpkg_arch: "{{ dpkg_arch.stdout }}"
      tags: [nodesource]
    - name: Capture distro codename
      # Read /etc/os-release (always present) rather than lsb_release, whose
      # binary is not installed on minimal images (e.g. the notebook container)
      # and which is only installed later in this play anyway.
      shell: '. /etc/os-release && echo "${VERSION_CODENAME:-$UBUNTU_CODENAME}"'
      register: distro_codename
      changed_when: false
    - set_fact:
        distro_codename: "{{ distro_codename.stdout }}"
    - name: Install initial packages
      apt:
        name:
          - apt-transport-https
          - build-essential
          - ca-certificates
          - curl
          - file
          - git
          - lsb-release
          # Needed for deb822_repository to work.
          - python3-debian
          - wget
        state: present
        update_cache: yes
        cache_valid_time: 3600
    - name: Kubernetes repository
      deb822_repository:
        name: kubernetes
        uris: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor }}/deb/"
        signed_by: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor }}/deb/Release.key"
        suites:
          - /
        state: present
        enabled: true
    - name: 1Password repository
      deb822_repository:
        name: 1password
        uris: https://downloads.1password.com/linux/debian/{{ dpkg_arch }}
        signed_by: https://downloads.1password.com/linux/keys/1password.asc
        suites:
          - stable
        components:
          - main
        state: present
        enabled: true
      when: install_cloud_tools
    - name: GCloud repository
      deb822_repository:
        name: gcloud
        uris: https://packages.cloud.google.com/apt
        signed_by: https://packages.cloud.google.com/apt/doc/apt-key.gpg
        suites:
          - cloud-sdk
        components:
          - main
        state: present
        enabled: true
      when: install_cloud_tools
    - name: GitHub CLI repository
      deb822_repository:
        name: githubcli-archive-keyring
        uris: https://cli.github.com/packages
        signed_by: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        suites:
          - stable
        components:
          - main
        state: present
        enabled: true
    - name: HashiCorp repository
      deb822_repository:
        name: hashicorp
        uris: https://apt.releases.hashicorp.com
        signed_by: https://apt.releases.hashicorp.com/gpg
        suites:
          - "{{ distro_codename }}"
        components:
          - main
        state: present
        enabled: true
      when: install_cloud_tools
    - name: Grafana APT repository (e.g. mimirtool binary packages)
      deb822_repository:
        name: grafana
        uris:
          - https://apt.grafana.com
        signed_by: https://apt.grafana.com/gpg.key
        suites:
          - stable
        components:
          - main
        state: present
        enabled: true
      when: install_cloud_tools
    # Docker's apt repo path is per-distro: /linux/ubuntu vs /linux/debian
    # (Raspberry Pi OS reports as Debian). Derive it so this works on both.
    - name: Docker Engine repository
      deb822_repository:
        name: docker
        uris: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}"
        signed_by: "https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg"
        suites:
          - "{{ distro_codename }}"
        components:
          - stable
        architectures:
          - "{{ dpkg_arch }}"
        state: present
        enabled: true
      when: install_docker
    - name: NodeSource repository (Node.js LTS deb822 .sources)
      deb822_repository:
        name: nodesource
        uris:
          - https://deb.nodesource.com/node_22.x
        signed_by: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        suites:
          - nodistro
        components:
          - main
        architectures:
          - "{{ dpkg_arch }}"
        state: present
        enabled: true
      when: dpkg_arch in ['amd64', 'arm64']
    - name: Prefer NodeSource nodejs over distro packages
      copy:
        dest: /etc/apt/preferences.d/nodejs
        mode: "0644"
        content: |
          Package: nodejs
          Pin: origin deb.nodesource.com
          Pin-Priority: 600
      when: dpkg_arch in ['amd64', 'arm64']
    - name: VS Code repository
      deb822_repository:
        name: vscode
        uris: https://packages.microsoft.com/repos/code
        signed_by: https://packages.microsoft.com/keys/microsoft.asc
        suites:
          - stable
        components:
          - main
        architectures:
          - "{{ dpkg_arch }}"
        state: present
        enabled: true
      when: install_vscode

    - name: Claude Code APT repository
      deb822_repository:
        name: claude-code
        uris:
          - https://downloads.claude.ai/claude-code/apt/stable
        signed_by: https://downloads.claude.ai/keys/claude-code.asc
        suites:
          - stable
        components:
          - main
        state: present
        # Repo serves amd64 + arm64 only; not armhf.
        enabled: "{{ dpkg_arch in ['amd64', 'arm64'] }}"
      when: install_claude_code

    - name: Install base packages
      apt:
        name:
          - ansible
          - apache2-utils
          - apt-transport-https
          - apt-utils
          - aspell
          - bsdmainutils
          - buildah
          - ca-certificates
          - dialog
          - dnsutils
          - file
          - gh
          - git
          - htop
          - jq
          - nodejs
          - pandoc
          - procps
          - pre-commit
          - rclone
          - rsync
          - shellcheck
          - stow
          - sudo
          - tmux
          - tree
          - zsh
          - zsh-autosuggestions
          - zsh-syntax-highlighting
        state: present
        # No cache_valid_time since we just changed the repos.
        update_cache: yes

    - name: Install VS Code
      apt:
        name:
          - code
          # VS Code wants libasound2 but that is a virtual package.
          - libasound2t64
          - xdg-utils
        state: present
      when: install_vscode

    - name: Install Claude Code
      apt:
        name: claude-code
        state: present
      when: install_claude_code and dpkg_arch in ['amd64', 'arm64']

    - name: Install Kubernetes tools
      apt:
        name:
          - kubectl
          - kubectx
        state: present
      when: install_k8s_tools

    - name: Install cloud / ops tools
      apt:
        name:
          - 1password-cli
          - google-cloud-cli
          - mimirtool
          - terraform
        state: present
      when: install_cloud_tools

    - name: Install QEMU cross-build support
      apt:
        name:
          - binfmt-support
          - qemu-user-static
        state: present
      when: install_qemu

    - name: Install notebook PDF rendering packages
      apt:
        name:
          - texlive-fonts-recommended
          - texlive-plain-generic
          - texlive-xetex
        state: present
      when: install_notebook_tools

    - name: Install Docker Engine packages
      apt:
        name:
          - containerd.io
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
        state: present
      when: install_docker

    # /run/systemd/system exists only when systemd is PID 1 (the sd_booted(3)
    # check). It is absent during container image builds (buildah/docker build),
    # where `systemctl start` fails with "Service is in unknown state". Gate the
    # service start on it so the same playbook bakes into images (e.g. the tiles
    # datascience-notebook image) yet still enables+starts docker on real
    # Pi/WSL hosts. The docker packages are still installed either way.
    - name: Detect whether systemd is the running init
      stat:
        path: /run/systemd/system
      register: systemd_running
      when: install_docker
    - name: Enable and start Docker Engine
      systemd:
        name: docker
        enabled: true
        state: started
      when: install_docker and systemd_running.stat.exists
    - name: Ensure docker group exists
      group:
        name: docker
        state: present
      when: install_docker
    - name: Add Ansible connection user to docker group
      user:
        name: "{{ ansible_env.SUDO_USER | default(ansible_user) }}"
        groups: docker
        append: true
      when: install_docker

    - name: Check installed Go version
      command: /usr/local/go/bin/go version
      register: go_installed
      changed_when: false
      failed_when: false
    - name: Install Go {{ golang_version }}
      shell: |
        curl -LO "https://go.dev/dl/go{{ golang_version }}.linux-{{ dpkg_arch }}.tar.gz"
        rm -rf /usr/local/go
        tar -C /usr/local -xzf go{{ golang_version }}.linux-{{ dpkg_arch }}.tar.gz
        rm go{{ golang_version }}.linux-{{ dpkg_arch }}.tar.gz
      when: "'go' + golang_version not in go_installed.stdout"

    - name: Check if Homebrew is already installed
      stat:
        path: /home/linuxbrew/.linuxbrew/bin/brew
      register: brew_stat
      when: install_brew
    - name: Install Homebrew
      become: no
      shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      when: install_brew and not brew_stat.stat.exists
    - name: Add Homebrew to PATH for all users
      lineinfile:
        path: /etc/profile.d/brew.sh
        line: eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        create: yes
        state: present
      when: install_brew

    - name: Install notebook analysis Python packages
      pip:
        name:
          # Offline notebook execution and parameter injection.
          - papermill
          # Ardupilot .bin log parsing for flight analysis notebooks.
          - pymavlink
          # Kubernetes Python client for cluster health notebooks.
          - kubernetes
          # PDF export via headless Chromium (playwright provides the browser).
          - nbconvert[webpdf]
          # Interactive map tiles in flight analysis notebooks.
          - folium
        state: present
      when: install_notebook_tools

    - name: Install Playwright browsers for webpdf export
      shell: python3 -m playwright install --with-deps chromium
      environment:
        PLAYWRIGHT_BROWSERS_PATH: /opt/playwright-browsers
      when: install_notebook_tools

    - name: Allow all users to read/execute Playwright browsers
      shell: chmod -R o+rx /opt/playwright-browsers
      when: install_notebook_tools

    - name: Install Homebrew packages
      become: false
      community.general.homebrew:
        # No first-party DEB822/repo for these: use brew, or swap to pinned release tarballs / go install later.
        name:
          - argocd
          - cilium-cli
          - go-jsonnet
          - jsonnet-bundler
          - talosctl
          - tanka
          # mikefarah yq v4 (Go). NOT apt: apt's `yq` is python-yq (jq wrapper),
          # which JSON-quotes strings and breaks tiles' ci-tools/helm-add-repos.sh
          # (`helm repo add` -> "invalid chart URL format"). See dotfiles-symm#10.
          - yq
        state: present
        update_homebrew: true
        upgrade_all: true
      when: install_brew

    # Helm, pinned to the exact version tiles CI uses (azure/setup-helm in
    # .github/actions/helm-setup) so `build.sh` renders are byte-identical to CI.
    # NOT from apt: the Buildkite helm-debian repo's only 4.x build is 4.2.0, not
    # the pinned 4.1.4 -- so fetch the exact release from get.helm.sh (the same
    # source azure/setup-helm uses; portable to amd64/arm64 via dpkg_arch).
    # This is ops/build tooling, so it follows install_cloud_tools (off on rpi).
    - name: Check installed helm version
      command: helm version --short
      register: helm_installed
      changed_when: false
      failed_when: false
      when: install_cloud_tools
    - name: Install helm {{ helm_version }} to /usr/local/bin
      become: true
      unarchive:
        src: "https://get.helm.sh/helm-v{{ helm_version }}-linux-{{ dpkg_arch }}.tar.gz"
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - --strip-components=1
          - linux-{{ dpkg_arch }}/helm
        mode: "0755"
      when:
        - install_cloud_tools
        - helm_version not in (helm_installed.stdout | default(''))
