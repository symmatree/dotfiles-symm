---
- name: Install GitHub CLI and Linux Homebrew
  hosts: all
  become: yes
  tasks:
    - name: Capture dpkg architecture
      command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false
      tags: [nodesource]
    - set_fact:
        dpkg_arch: "{{ dpkg_arch.stdout }}"
      tags: [nodesource]
    - name: Capture Ubuntu codename
      command: lsb_release -cs
      register: ubuntu_codename
      changed_when: false
    - set_fact:
        ubuntu_codename: "{{ ubuntu_codename.stdout }}"
    - name: Install initial packages
      apt:
        name:
          - apt-transport-https
          - build-essential
          - ca-certificates
          - curl
          - file
          - git
          - lsb-release
          # Needed for deb822_repository to work.
          - python3-debian
          - software-properties-common
          - wget
        state: present
        update_cache: yes
        cache_valid_time: 3600
    - name: Kubernetes repository
      deb822_repository:
        name: kubernetes
        uris: https://pkgs.k8s.io/core:/stable:/v1.32/deb/
        signed_by: https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key
        suites:
          - /
        state: present
        enabled: true
    - name: 1Password repository
      deb822_repository:
        name: 1password
        uris: https://downloads.1password.com/linux/debian/{{ dpkg_arch }}
        signed_by: https://downloads.1password.com/linux/keys/1password.asc
        suites:
          - stable
        components:
          - main
        state: present
        enabled: true
    - name: GCloud repository
      deb822_repository:
        name: gcloud
        uris: https://packages.cloud.google.com/apt
        signed_by: https://packages.cloud.google.com/apt/doc/apt-key.gpg
        suites:
          - cloud-sdk
        components:
          - main
        state: present
        enabled: true
    - name: GitHub CLI repository
      deb822_repository:
        name: githubcli-archive-keyring
        uris: https://cli.github.com/packages
        signed_by: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        suites:
          - stable
        components:
          - main
        state: present
        enabled: true
    - name: HashiCorp repository
      deb822_repository:
        name: hashicorp
        uris: https://apt.releases.hashicorp.com
        signed_by: https://apt.releases.hashicorp.com/gpg
        suites:
          - "{{ ubuntu_codename }}"
        components:
          - main
        state: present
        enabled: true
    - name: Grafana APT repository (e.g. mimirtool binary packages)
      deb822_repository:
        name: grafana
        uris:
          - https://apt.grafana.com
        signed_by: https://apt.grafana.com/gpg.key
        suites:
          - stable
        components:
          - main
        state: present
        enabled: true
    - name: Docker Engine repository
      deb822_repository:
        name: docker
        uris: https://download.docker.com/linux/ubuntu
        signed_by: https://download.docker.com/linux/ubuntu/gpg
        suites:
          - "{{ ubuntu_codename }}"
        components:
          - stable
        architectures:
          - "{{ dpkg_arch }}"
        state: present
        enabled: true
    # - name: Helm APT repository (community Debian packages hosted on Buildkite)
    #   deb822_repository:
    #     name: helm
    #     uris:
    #       - https://packages.buildkite.com/helm-linux/helm-debian/any/
    #     signed_by: https://packages.buildkite.com/helm-linux/helm-debian/gpgkey
    #     suites:
    #       - any
    #     components:
    #       - main
    #     state: present
    #     enabled: true
    - name: Remove legacy NodeSource one-line APT list if present
      file:
        path: /etc/apt/sources.list.d/nodesource.list
        state: absent
    - name: NodeSource repository (Node.js LTS deb822 .sources)
      deb822_repository:
        name: nodesource
        uris:
          # Node 22.x LTS -- change path to node_20.x etc. if you need another major.
          - https://deb.nodesource.com/node_22.x
        signed_by: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        suites:
          - nodistro
        components:
          - main
        architectures:
          - "{{ dpkg_arch }}"
        state: present
        enabled: true
      when: dpkg_arch in ['amd64', 'arm64']
    - name: Prefer NodeSource nodejs over distro packages
      copy:
        dest: /etc/apt/preferences.d/nodejs
        mode: "0644"
        content: |
          Package: nodejs
          Pin: origin deb.nodesource.com
          Pin-Priority: 600
      when: dpkg_arch in ['amd64', 'arm64']
    - name: Install software
      apt:
        name:
          - 1password-cli
          - ansible
          - apache2-utils
          - apt-transport-https
          - apt-utils
          - aspell
          - binfmt-support
          - bsdmainutils
          - buildah
          - ca-certificates
          - containerd.io
          - dialog
          - dnsutils
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
          - file
          - gh
          - git
          - google-cloud-cli
          # - helm
          - htop
          - jq
          - kubectl
          - kubectx
          # vscode wants libasound2 but that is a virtual package.
          - libasound2t64
          - mimirtool
          - nodejs
          - pandoc
          - procps
          - pre-commit
          - qemu-user-static
          - rclone
          - shellcheck
          - stow
          - sudo
          - terraform
          - tmux
          - tree
          - xdg-utils
          - yq
          - zsh
          - zsh-autosuggestions
          - zsh-syntax-highlighting
        state: present
        # No cache_valid_time since we just changed the repos.
        update_cache: yes
    - name: Enable and start Docker Engine
      systemd:
        name: docker
        enabled: true
        state: started
    - name: Ensure docker group exists
      group:
        name: docker
        state: present
    - name: Add Ansible connection user to docker group
      user:
        name: "{{ ansible_env.SUDO_USER | default(ansible_user) }}"
        groups: docker
        append: true
    - name: Check if Homebrew is already installed
      stat:
        path: /home/linuxbrew/.linuxbrew/bin/brew
      register: brew_stat
    - name: Install Homebrew
      become: no
      shell: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      when: not brew_stat.stat.exists
    - name: Add Homebrew to PATH for all users
      lineinfile:
        path: /etc/profile.d/brew.sh
        line: eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        create: yes
        state: present
    - name: Install golang 1.24.1
      shell: |
        curl -LO "https://go.dev/dl/go1.24.1.linux-{{ dpkg_arch }}.tar.gz"
        tar -C /usr/local -xzf go1.24.1.linux-{{ dpkg_arch }}.tar.gz
        rm go1.24.1.linux-{{ dpkg_arch }}.tar.gz
      args:
        creates: /usr/local/go/bin/go
    - name: Install Homebrew packages
      become: false
      community.general.homebrew:
        # No first-party DEB822/repo for these: use brew, or swap to pinned release tarballs / go install later.
        name:
          - argocd
          - cilium-cli
          - go-jsonnet
          - jsonnet-bundler
          - talosctl
          - tanka
        state: present
        update_homebrew: true
        upgrade_all: true
    - name: Check if VSCode is already installed
      stat:
        path: /usr/bin/code
      register: code_stat
    - name: Install vscode
      when: not code_stat.stat.exists
      block:
        - name: Add Microsoft repository
          shell: |
            echo "code code/add-microsoft-repo boolean true" | sudo debconf-set-selections
          changed_when: false
        - name: Install packages
          apt:
            deb: https://go.microsoft.com/fwlink/?LinkID=760868
            state: present
